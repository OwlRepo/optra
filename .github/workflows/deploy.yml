name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: VPS_PROD
    timeout-minutes: 30
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 25m
          envs: DEPLOY_DOMAIN
          script: |
            set -eu
            cd /opt/mnemra

            command -v docker >/dev/null
            docker compose version >/dev/null
            test -f docker-compose.prod.yml
            test -f .env.prod

            git fetch origin
            git checkout main
            git pull --ff-only origin main

            mkdir -p /opt/mnemra-backups
            postgres_container_id="$(docker compose -f docker-compose.prod.yml ps -q postgres || true)"

            if [ -n "$postgres_container_id" ]; then
              backup_file=/opt/mnemra-backups/mnemra-$(date +%F-%H%M%S).sql
              echo "creating PostgreSQL backup: $backup_file"
              docker compose -f docker-compose.prod.yml exec -T postgres \
                pg_dump -U postgres -d mnemra > "$backup_file"
              test -s "$backup_file"
              find /opt/mnemra-backups -type f -name 'mnemra-*.sql' -mtime +14 -delete
            else
              echo "skipping backup: postgres container not running yet"
            fi

            echo "building images"
            docker compose -f docker-compose.prod.yml build api
            docker compose -f docker-compose.prod.yml build web

            echo "starting production containers"
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker compose -f docker-compose.prod.yml ps

            api_ok=0
            for i in $(seq 1 15); do
              curl -fsS --connect-timeout 2 --max-time 5 http://localhost:3001/health >/dev/null && { api_ok=1; break; }
              echo "api health check retry $i..."; sleep 4
            done
            if [ "$api_ok" -ne 1 ]; then
              echo "api health check failed"
              docker compose -f docker-compose.prod.yml logs --tail=120 api web postgres
              exit 1
            fi

            web_ok=0
            for i in $(seq 1 10); do
              curl -fsS --connect-timeout 2 --max-time 5 http://localhost:3000 >/dev/null && { web_ok=1; break; }
              echo "web health check retry $i..."; sleep 3
            done
            if [ "$web_ok" -ne 1 ]; then
              echo "web health check failed"
              docker compose -f docker-compose.prod.yml logs --tail=120 api web postgres
              exit 1
            fi

            html="$(mktemp)"
            curl -fsS --max-time 15 "https://${DEPLOY_DOMAIN}/" -o "$html" || { echo "public smoke fetch failed"; exit 1; }
            if grep -Eq 'hmr-client|next-devtools|\.next/dev|localhost:3001' "$html"; then
              echo "public smoke check found dev artifacts"; exit 1
            fi

            echo "deployment completed successfully"
