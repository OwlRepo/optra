name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: VPS_PROD
    timeout-minutes: 30
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 25m
          script: |
            set -eu
            cd /home/deploy/apps/optra

            command -v docker >/dev/null
            docker compose version >/dev/null
            test -f docker-compose.prod.yml
            test -f .env

            # Compose auto-reads .env for ${VAR} interpolation on its own.
            # Only DOMAIN is needed here (smoke test). Do NOT source .env — values may
            # contain shell metacharacters like '(' and would break `. ./.env`.
            DOMAIN="$(grep -m1 '^DOMAIN=' .env | cut -d= -f2- | tr -d '\r')"
            COMPOSE_PROFILES="$(grep -m1 '^COMPOSE_PROFILES=' .env | cut -d= -f2- | tr -d '\r' | tr -d '[:space:]' || true)"
            export COMPOSE_PROFILES
            public_ingress_enabled=0
            case ",$COMPOSE_PROFILES," in
              *",public,"*) public_ingress_enabled=1 ;;
            esac

            echo "syncing repository"
            git fetch --prune origin main
            git switch main
            if [ -n "$(git status --porcelain --untracked-files=normal)" ]; then
              echo "stashing local deploy checkout changes before update"
              git stash push --include-untracked -m "pre-deploy-$(date +%Y%m%d%H%M%S)"
            fi
            git merge --ff-only origin/main
            echo "checked out $(git rev-parse --short HEAD)"

            sh scripts/ensure-seaweedfs-s3-config.sh

            mkdir -p /home/deploy/apps/optra-backups
            postgres_container_id="$(docker compose -f docker-compose.prod.yml ps -q postgres || true)"

            if [ -n "$postgres_container_id" ]; then
              backup_file=/home/deploy/apps/optra-backups/optra-$(date +%F-%H%M%S).sql
              echo "creating PostgreSQL backup: $backup_file"
              docker compose -f docker-compose.prod.yml exec -T postgres \
                sh -c 'pg_dump -U "$POSTGRES_USER" -d "$POSTGRES_DB"' > "$backup_file"
              test -s "$backup_file"
              find /home/deploy/apps/optra-backups -type f -name 'optra-*.sql' -mtime +14 -delete
            else
              echo "skipping backup: postgres container not running yet"
            fi

            echo "building images"
            docker compose -f docker-compose.prod.yml build api
            docker compose -f docker-compose.prod.yml build web

            echo "starting production containers"
            if [ "$public_ingress_enabled" -ne 1 ]; then
              echo "bundled Caddy profile disabled; removing old Caddy container if present"
              docker rm -f optra-prod-caddy >/dev/null 2>&1 || true
            fi
            docker compose -f docker-compose.prod.yml up -d --remove-orphans --force-recreate
            docker compose -f docker-compose.prod.yml ps

            api_ok=0
            for i in $(seq 1 15); do
              docker compose -f docker-compose.prod.yml exec -T api \
                curl -fsS -o /dev/null http://127.0.0.1:3001/health && { api_ok=1; break; }
              echo "api health check retry $i..."; sleep 4
            done
            if [ "$api_ok" -ne 1 ]; then
              echo "api health check failed"
              docker compose -f docker-compose.prod.yml logs --tail=120 api web postgres seaweedfs
              exit 1
            fi

            web_ok=0
            for i in $(seq 1 10); do
              docker compose -f docker-compose.prod.yml exec -T web \
                wget -q -O /dev/null http://127.0.0.1:3000/ && { web_ok=1; break; }
              echo "web health check retry $i..."; sleep 3
            done
            if [ "$web_ok" -ne 1 ]; then
              echo "web health check failed"
              if [ "$public_ingress_enabled" -eq 1 ]; then
                docker compose -f docker-compose.prod.yml logs --tail=120 api web postgres seaweedfs caddy
              else
                docker compose -f docker-compose.prod.yml logs --tail=120 api web postgres seaweedfs
              fi
              exit 1
            fi

            echo "checking production S3 round trip"
            docker compose -f docker-compose.prod.yml exec -T api env NODE_NO_WARNINGS=1 node <<'NODE'
            const {
              CreateBucketCommand,
              DeleteObjectCommand,
              GetObjectCommand,
              HeadBucketCommand,
              PutObjectCommand,
              S3Client,
            } = require('@aws-sdk/client-s3')

            const client = new S3Client({
              endpoint: process.env.S3_ENDPOINT,
              region: process.env.S3_REGION,
              credentials: {
                accessKeyId: process.env.S3_ACCESS_KEY,
                secretAccessKey: process.env.S3_SECRET_KEY,
              },
              forcePathStyle: process.env.S3_FORCE_PATH_STYLE === 'true',
            })

            const bucket = process.env.S3_BUCKET
            const key = `deploy-healthcheck/${Date.now()}-${process.pid}.txt`

            async function ensureBucket() {
              try {
                await client.send(new HeadBucketCommand({ Bucket: bucket }))
                return
              } catch (error) {
                const code = error?.name || error?.Code || error?.$metadata?.httpStatusCode
                if (!['NotFound', 'NoSuchBucket', '404', 404].includes(code)) throw error
              }

              await client.send(new CreateBucketCommand({ Bucket: bucket }))
            }

            async function main() {
              await ensureBucket()
              await client.send(new PutObjectCommand({
                Bucket: bucket,
                Key: key,
                Body: Buffer.from('ok'),
                ContentType: 'text/plain',
              }))

              const result = await client.send(new GetObjectCommand({ Bucket: bucket, Key: key }))
              const chunks = []
              for await (const chunk of result.Body) {
                chunks.push(Buffer.isBuffer(chunk) ? chunk : Buffer.from(chunk))
              }
              const body = Buffer.concat(chunks).toString('utf8')
              await client.send(new DeleteObjectCommand({ Bucket: bucket, Key: key }))

              if (body !== 'ok') {
                throw new Error(`unexpected S3 round-trip body: ${body}`)
              }

              console.log('s3 round trip ok')
            }

            main().catch((error) => {
              console.error(error?.name || error?.Code || 'S3Error')
              console.error(error?.message || String(error))
              process.exit(1)
            })
            NODE

            if [ "$public_ingress_enabled" -eq 1 ]; then
              html="$(mktemp)"
              curl -fsS --max-time 15 "https://${DOMAIN}/" -o "$html" || { echo "public smoke fetch failed"; exit 1; }
              if grep -Eq 'hmr-client|next-devtools|\.next/dev|localhost:[0-9]+|127\.0\.0\.1' "$html"; then
                echo "public smoke check found dev artifacts"; exit 1
              fi
            else
              echo "skipping public HTTPS smoke; set COMPOSE_PROFILES=public only when Optra owns 80/443"
            fi

            echo "deployment completed successfully"
