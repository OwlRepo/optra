<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" data-mark="optra-mark">
  <title>Optra aperture mark</title>
  <desc>A six-blade aperture converging on an open iris, representing vision-aware matching across many vendor options converging to one choice.</desc>
  <defs>
    <radialGradient id="irisGlow" gradientUnits="userSpaceOnUse" cx="300" cy="300" r="240">
      <stop offset="0" stop-color="#1FB6A3"/>
      <stop offset="0.42" stop-color="#1FB6A3"/>
      <stop offset="1" stop-color="#0A5056"/>
    </radialGradient>
    <path id="blade" d="M 268.0 72.2
      A 230 230 0 0 1 453.9 129.1
      Q 453.4 226.8 399.9 294.8
      A 100 100 0 0 0 366.9 225.7
      Q 349.7 137.4 268.0 72.2
      Z"/>
  </defs>
  <g fill="url(#irisGlow)" stroke="url(#irisGlow)" stroke-width="10" stroke-linejoin="round" stroke-linecap="round">
    <use href="#blade"/>
    <use href="#blade" transform="rotate(60 300 300)"/>
    <use href="#blade" transform="rotate(120 300 300)"/>
    <use href="#blade" transform="rotate(180 300 300)"/>
    <use href="#blade" transform="rotate(240 300 300)"/>
    <use href="#blade" transform="rotate(300 300 300)"/>
  </g>
</svg>
