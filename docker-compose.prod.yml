name: mnemra-prod

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mnemra-prod-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-mnemra}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mnemra-prod-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs
    container_name: mnemra-prod-seaweedfs
    restart: unless-stopped
    command: server -s3 -s3.config=/etc/seaweedfs/s3.json -dir=/data
    volumes:
      - seaweedfs_data:/data
      - ./docker/seaweedfs/s3.prod.json:/etc/seaweedfs/s3.json:ro
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "http://127.0.0.1:9333/cluster/status",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: prod
    # Pinned, not left to host default: Hetzner CX21 is linux/amd64 native,
    # so this is a no-op here — duckdb has no arm64 Linux prebuilt binary
    # and no in-image toolchain to compile one, so an explicit pin prevents
    # ever silently building the wrong arch on a different host later.
    platform: linux/amd64
    container_name: mnemra-prod-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mnemra}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      S3_ENDPOINT: http://seaweedfs:8333
      WEB_URL: https://${DOMAIN}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY required}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-mnemra-prod}
    networks:
      - internal
      - web
    healthcheck:
      test:
        ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://127.0.0.1:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN}/api
    container_name: mnemra-prod-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      API_URL: http://api:3001
      NEXT_PUBLIC_API_URL: https://${DOMAIN}/api
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mnemra}
      WEB_URL: https://${DOMAIN}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY required}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-mnemra-prod}
    networks:
      - internal
      - web
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  caddy:
    image: caddy:2-alpine
    container_name: mnemra-prod-caddy
    profiles: ["public"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN required}
    networks:
      - web
    depends_on:
      web:
        condition: service_healthy

networks:
  internal:
    driver: bridge
  web:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  seaweedfs_data:
  caddy_data:
  caddy_config:
