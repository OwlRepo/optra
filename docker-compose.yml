name: optra

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: optra-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: optra
    ports:
      - "54322:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: optra-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs
    container_name: optra-seaweedfs
    command: server -s3 -s3.config=/etc/seaweedfs/s3.json -dir=/data
    ports:
      - "8433:8333"
      - "8988:8888"
      - "9433:9333"
    volumes:
      - seaweedfs_data:/data
      - ./docker/seaweedfs/s3.json:/etc/seaweedfs/s3.json:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9333/cluster/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    # Pinned: production (Hetzner CX21) is linux/amd64 native, and duckdb's
    # only reliable prebuilt Linux binary is amd64 (no arm64 build, no
    # toolchain in the image to compile from source). On Apple Silicon this
    # builds/runs under emulation instead of crashing/hanging at dlopen.
    platform: linux/amd64
    container_name: optra-api
    ports:
      - "${OPTRA_API_PORT:-3301}:3001"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/optra
      REDIS_HOST: redis
      REDIS_PORT: 6379
      S3_ENDPOINT: http://seaweedfs:8333
      S3_REGION: us-east-1
      S3_ACCESS_KEY: 4ec7af4df6681cc7c51dfd44b372e353f68094e868c835f0
      S3_SECRET_KEY: abf9c738cb378408b18ff4c392c23b2cb4df9b516b5596adf6cc6234ab62335f0277d578f5a5acc0d22a6c4d55053ab4
      S3_BUCKET: optra-documents
      S3_FORCE_PATH_STYLE: "true"
      WEB_URL: http://localhost:${OPTRA_WEB_PORT:-3300}
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://127.0.0.1:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    container_name: optra-web
    ports:
      - "${OPTRA_WEB_PORT:-3300}:3000"
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${OPTRA_API_PORT:-3301}
      API_URL: http://api:3001
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  seaweedfs_data:
  api_node_modules:
  web_node_modules:
